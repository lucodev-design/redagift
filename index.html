<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡FELIZ CUMPLEAÑOS SAYDA! 🎉</title>
    <link rel="stylesheet" href="styles/index.css">
</head>
<body>
    <div class="stars" id="stars"></div>
    <div class="balloons">
        <div class="balloon"></div>
        <div class="balloon"></div>
        <div class="balloon"></div>
        <div class="balloon"></div>
        <div class="balloon"></div>
        <div class="balloon"></div>
    </div>
    
    <div class="container">
        <h1 class="title">🎉 ¡FELIZ CUMPLEAÑOS! 🎉</h1>
        <h2 class="name">SAYDA</h2>
        <p class="message">
            ¡Que este día especial esté lleno de alegría, amor y momentos inolvidables!<br>
            🌟 Eres única y maravillosa 🌟<br>
            ¡Te deseamos lo mejor del mundo! 🎂✨
        </p>
    </div>

    <script>
        // Crear estrellas
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 100; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                star.style.animationDuration = (Math.random() * 3 + 1) + 's';
                starsContainer.appendChild(star);
            }
        }

        // Crear confeti
        function createConfetti() {
            const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd'];
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.animationDuration = (Math.random() * 3 + 2) + 's';
                    confetti.style.animationDelay = Math.random() * 2 + 's';
                    document.body.appendChild(confetti);

                    setTimeout(() => {
                        confetti.remove();
                    }, 5000);
                }, i * 100);
            }
        }

        // Iniciar animaciones
        createStars();
        setInterval(createConfetti, 3000);

        // Efecto de click para más confeti
        document.addEventListener('click', createConfetti);
    </script>
</body>
</html>
